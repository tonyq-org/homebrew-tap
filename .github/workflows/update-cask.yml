name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (without v prefix)'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Download DMGs and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BASE="https://github.com/tony1223/better-agent-terminal/releases/download/v${VERSION}"

          ARM_URL="${BASE}/BetterAgentTerminal-${VERSION}-arm64.dmg"
          X64_URL="${BASE}/BetterAgentTerminal-${VERSION}-x64.dmg"

          echo "Downloading $ARM_URL"
          curl -fsSL "$ARM_URL" -o arm64.dmg
          ARM_SHA=$(shasum -a 256 arm64.dmg | awk '{print $1}')
          echo "arm64 SHA256: $ARM_SHA"
          echo "ARM_SHA=$ARM_SHA" >> $GITHUB_OUTPUT

          echo "Downloading $X64_URL"
          curl -fsSL "$X64_URL" -o x64.dmg
          X64_SHA=$(shasum -a 256 x64.dmg | awk '{print $1}')
          echo "x64 SHA256: $X64_SHA"
          echo "X64_SHA=$X64_SHA" >> $GITHUB_OUTPUT

      - name: Update Cask
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARM_SHA="${{ steps.sha.outputs.ARM_SHA }}"
          X64_SHA="${{ steps.sha.outputs.X64_SHA }}"
          cat > Casks/better-agent-terminal.rb << EOF
          cask "better-agent-terminal" do
            version "${VERSION}"

            on_arm do
              sha256 "${ARM_SHA}"
              url "https://github.com/tony1223/better-agent-terminal/releases/download/v#{version}/BetterAgentTerminal-#{version}-arm64.dmg"
            end

            on_intel do
              sha256 "${X64_SHA}"
              url "https://github.com/tony1223/better-agent-terminal/releases/download/v#{version}/BetterAgentTerminal-#{version}-x64.dmg"
            end

            name "BetterAgentTerminal"
            desc "Terminal aggregator with multi-workspace support and Claude Code integration"
            homepage "https://github.com/tony1223/better-agent-terminal"

            app "BetterAgentTerminal.app"
          end
          EOF
          # Remove leading spaces from heredoc
          sed -i 's/^          //' Casks/better-agent-terminal.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/better-agent-terminal.rb
          git commit -m "Update better-agent-terminal to ${{ steps.version.outputs.VERSION }}"
          git push
