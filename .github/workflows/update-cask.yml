name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (without v prefix)'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Download lightweight DMGs and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BASE="https://github.com/tony1223/better-agent-terminal/releases/download/v${VERSION}"

          ARM_URL="${BASE}/BetterAgentTerminal-${VERSION}-arm64.lightweight.dmg"
          X64_URL="${BASE}/BetterAgentTerminal-${VERSION}-x64.lightweight.dmg"

          echo "Downloading $ARM_URL"
          curl -fsSL "$ARM_URL" -o arm64.dmg
          ARM_SHA=$(shasum -a 256 arm64.dmg | awk '{print $1}')
          echo "arm64 SHA256: $ARM_SHA"
          echo "ARM_SHA=$ARM_SHA" >> $GITHUB_OUTPUT

          echo "Downloading $X64_URL"
          curl -fsSL "$X64_URL" -o x64.dmg
          X64_SHA=$(shasum -a 256 x64.dmg | awk '{print $1}')
          echo "x64 SHA256: $X64_SHA"
          echo "X64_SHA=$X64_SHA" >> $GITHUB_OUTPUT

      - name: Update Casks
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARM_SHA="${{ steps.sha.outputs.ARM_SHA }}"
          X64_SHA="${{ steps.sha.outputs.X64_SHA }}"
          cat > Casks/better-agent-terminal.rb << EOF
          cask "better-agent-terminal" do
            version "${VERSION}"

            on_arm do
              sha256 "${ARM_SHA}"

              url "https://github.com/tony1223/better-agent-terminal/releases/download/v#{version}/BetterAgentTerminal-#{version}-arm64.lightweight.dmg"
            end
            on_intel do
              sha256 "${X64_SHA}"

              url "https://github.com/tony1223/better-agent-terminal/releases/download/v#{version}/BetterAgentTerminal-#{version}-x64.lightweight.dmg"
            end

            name "BetterAgentTerminal"
            desc "Terminal aggregator with multi-workspace support and Claude Code integration"
            homepage "https://github.com/tony1223/better-agent-terminal"

            depends_on formula: "node"
            depends_on cask: ["codex", "claude-code"]

            app "BetterAgentTerminal.app"
          end
          EOF
          # Remove leading spaces from heredoc
          sed -i 's/^          //' Casks/better-agent-terminal.rb

          # The pre-release channel tracks the newest build of any kind, so a
          # stable release also advances better-agent-terminal-pre: a stable
          # version outranks the preceding pre in Homebrew's version compare,
          # and the arm64 lightweight DMG (which the pre cask uses) is built
          # for stable too. Reuse the arm64 SHA computed above (pre is arm64
          # only). This is written in the same commit as the stable cask, so
          # the two never race on push.
          cat > Casks/better-agent-terminal-pre.rb << EOF
          cask "better-agent-terminal-pre" do
            version "${VERSION}"
            sha256 "${ARM_SHA}"

            url "https://github.com/tony1223/better-agent-terminal/releases/download/v#{version}/BetterAgentTerminal-#{version}-arm64.lightweight.dmg"

            name "BetterAgentTerminal (Pre-release)"
            desc "Terminal aggregator with multi-workspace support and Claude Code integration (pre-release channel)"
            homepage "https://github.com/tony1223/better-agent-terminal"

            depends_on arch: :arm64
            depends_on formula: "node"
            depends_on cask: ["codex", "claude-code"]

            conflicts_with cask: "better-agent-terminal"

            app "BetterAgentTerminal.app"
          end
          EOF
          sed -i 's/^          //' Casks/better-agent-terminal-pre.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/better-agent-terminal.rb Casks/better-agent-terminal-pre.rb
          git commit -m "Update better-agent-terminal + pre to ${{ steps.version.outputs.VERSION }}"
          git push
